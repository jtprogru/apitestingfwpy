# https://taskfile.dev

version: "3"

vars:
  MOCK_URL: http://127.0.0.1:8000
  MOCK_BASE_URL: http://127.0.0.1:8000/objects

tasks:
  default:
    cmds:
      - task --list
    silent: true

  install:
    desc: Install all dependencies (default + dev groups)
    cmds:
      - uv sync

  test:
    desc: Run tests against the public restful-api.dev service
    cmds:
      - uv run pytest -vvv

  test:local:
    desc: Run tests against a locally running mock (start it via `task mock` first)
    cmds:
      - BASE_URL={{.MOCK_BASE_URL}} uv run pytest -vvv

  test:docker:
    desc: Build mock image, run tests against it, then tear it down
    cmds:
      - docker compose up -d --build mock
      - defer: docker compose down
      - until curl -sf {{.MOCK_URL}}/health > /dev/null; do sleep 0.3; done
      - BASE_URL={{.MOCK_BASE_URL}} uv run pytest -vvv

  mock:
    desc: Run the FastAPI mock locally on :8000
    cmds:
      - uv run --group mock uvicorn mock_service.main:app --host 0.0.0.0 --port 8000 --reload

  mock:docker:up:
    desc: Start the mock service in Docker
    cmds:
      - docker compose up -d --build mock

  mock:docker:down:
    desc: Stop and remove the mock service container
    cmds:
      - docker compose down
