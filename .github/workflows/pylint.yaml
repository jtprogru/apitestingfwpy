name: Pylint

on: [push]

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install
      - name: Analysing the code with pylint
        run: |
          uv sync --group mock
          uv run pylint src/conftest.py src/endpoints src/tests mock_service
